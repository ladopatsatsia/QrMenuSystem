services:
  # Backend API
  - type: web
    name: qrmenu-api
    runtime: docker
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: qrmenu-db
          property: connectionString
      - key: ASPNETCORE_ENVIRONMENT
        value: Production
      - key: JwtSettings__Key
        generateValue: true
      - key: JwtSettings__Issuer
        value: MenuManagementAPI
      - key: JwtSettings__Audience
        value: MenuManagementFrontend
      - key: Cors__AllowedOrigins__0
        value: https://qrmenu-frontend-6m70.onrender.com
    disk:
      name: uploads-disk
      mountPath: /app/wwwroot/uploads
      sizeGB: 1

  # Frontend (Admin + Public)
  - type: web
    name: qrmenu-frontend
    env: static
    buildCommand: "cd frontend && npm ci && npm run build"
    staticPublishPath: "frontend/dist/frontend/browser"
    routes:
      - type: rewrite
        source: /*
        destination: /index.html

databases:
  - name: qrmenu-db
    plan: free
