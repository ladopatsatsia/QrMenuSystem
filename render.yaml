services:
  # Backend API
  - type: web
    name: qrmenu-api
    runtime: docker
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: qrmenu-db
          property: connectionString
      - key: ASPNETCORE_ENVIRONMENT
        value: Production
    plan: free

  # Frontend (Admin + Public)
  - type: web
    name: qrmenu-frontend
    env: static
    buildCommand: "cd frontend && npm install && npm run build"
    staticPublishPath: "frontend/dist/frontend/browser"
    plan: free

databases:
  - name: qrmenu-db
    plan: free
