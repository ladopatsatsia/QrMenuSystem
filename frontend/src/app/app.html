<div class="app-wrapper">
  <aside class="sidebar" *ngIf="showSidebar()">
    <div class="logo">QR MENU</div>
    <nav>
      <a routerLink="/admin/dashboard" routerLinkActive="exact-active" [routerLinkActiveOptions]="{exact: true}">{{ translate('SIDEBAR_DASHBOARD') }}</a>
      <a routerLink="/admin/objects" routerLinkActive="active">{{ translate('SIDEBAR_MANAGE_VENUES') }}</a>
    </nav>
    <div class="user-box">
      <span>{{ translate('SIDEBAR_LOGGED_IN_AS') }} Admin</span>
      <button class="btn btn-sm btn-outline-danger" (click)="logout()">{{ translate('BUTTON_LOGOUT') }}</button>
    </div>
  </aside>
  
  <main [class.content]="showSidebar()" [class.no-sidebar]="!showSidebar()">
    <router-outlet></router-outlet>
  </main>
</div>
